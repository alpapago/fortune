<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>오늘의 운세 ✨</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --cream: #FFF8F0;
    --blush: #FFD6C8;
    --rose: #FF8FA3;
    --violet: #C9B8FF;
    --sky: #B8E0FF;
    --mint: #B8F0E0;
    --gold: #FFD966;
    --text: #3D2B4A;
    --text-light: #7A6085;
    --card-bg: #FFFCF8;
  }

  body {
    font-family: 'Gowun Dodum', serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    overflow-x: hidden;
    position: relative;
  }

  .bg-deco {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 0;
  }
  .bg-deco span {
    position: absolute;
    font-size: 1.4rem;
    opacity: 0.12;
    animation: float-deco 8s ease-in-out infinite;
  }
  @keyframes float-deco {
    0%, 100% { transform: translateY(0px) rotate(0deg); }
    50% { transform: translateY(-12px) rotate(10deg); }
  }

  .wrap {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.75rem;
  }

  header {
    text-align: center;
  }
  .header-emoji {
    font-size: 2.2rem;
    display: block;
    animation: spin-slow 6s linear infinite;
  }
  @keyframes spin-slow {
    0% { transform: rotate(0deg); }
    25% { transform: rotate(8deg); }
    75% { transform: rotate(-8deg); }
    100% { transform: rotate(0deg); }
  }
  header h1 {
    font-family: 'Noto Serif KR', serif;
    font-size: 1.35rem;
    font-weight: 700;
    color: var(--text);
    margin-top: 0.2rem;
    letter-spacing: -0.02em;
  }
  header p {
    font-size: 0.85rem;
    color: var(--text-light);
    margin-top: 0.3rem;
  }

  .date-badge {
    background: var(--violet);
    color: #3D2B4A;
    border-radius: 999px;
    padding: 0.35rem 1.1rem;
    font-size: 0.8rem;
    font-family: 'Gowun Dodum', serif;
    letter-spacing: 0.02em;
  }

  /* STAR rating */
  .star-row {
    display: flex;
    gap: 0.25rem;
    justify-content: center;
    margin: 0.2rem 0 0.1rem;
  }
  .star { font-size: 1.1rem; }

  /* Fortune card */
  .card {
    background: var(--card-bg);
    border-radius: 24px;
    border: 2px solid var(--blush);
    padding: 1.2rem 1.4rem;
    width: 100%;
    box-shadow: 0 4px 24px rgba(200,150,170,0.12);
    position: relative;
    overflow: hidden;
    transition: transform 0.3s ease, opacity 0.3s ease;
  }
  .card.hidden {
    opacity: 0;
    transform: scale(0.95) translateY(8px);
    pointer-events: none;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--rose), var(--violet), var(--gold));
  }

  .fortune-category {
    justify-content: center;
    text-align: center;
    font-size: 0.72rem;
    font-weight: 400;
    letter-spacing: 0.08em;
    color: var(--rose);
    text-transform: uppercase;
    margin-bottom: 0.5rem;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .fortune-title {
    text-align: center;
    font-family: 'Noto Serif KR', serif;
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 0.5rem;
    line-height: 1.5;
  }
  .fortune-body {
    text-align: center;
    font-size: 0.95rem;
    color: var(--text-light);
    line-height: 1.8;
  }

  /* Mini fortune items */
  .mini-cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
    width: 100%;
  }
  .mini-card {
    text-align: center;
    background: var(--card-bg);
    border: 1.5px solid var(--blush);
    border-radius: 16px;
    padding: 0.75rem;
    transition: transform 0.3s ease, opacity 0.3s ease;
  }
  .mini-card.hidden {
    opacity: 0;
    transform: translateY(6px);
  }
  .mini-card-label {
    justify-content: center;
    font-size: 0.7rem;
    color: var(--text-light);
    margin-bottom: 0.35rem;
    display: flex;
    align-items: center;
    gap: 0.3rem;
  }
  .mini-card-value {
    text-align: center;
    font-family: 'Noto Serif KR', serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--text);
  }

  /* Lucky color swatch */
  .color-dot {
    display: inline-block;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    vertical-align: -2px;
    margin-left: 6px;
    border: 1.5px solid rgba(0,0,0,0.1);
  }

  /* CTA button */
  .btn {
    background: var(--rose);
    color: white;
    border: none;
    border-radius: 999px;
    padding: 0.7rem 2rem;
    font-family: 'Gowun Dodum', serif;
    font-size: 1rem;
    cursor: pointer;
    transition: transform 0.15s, background 0.15s;
    box-shadow: 0 4px 16px rgba(255,143,163,0.35);
    width: 100%;
    max-width: 280px;
  }
  .btn:hover { background: #ff7090; transform: translateY(-2px); }
  .btn:active { transform: scale(0.97); }

  .footer-note {
    font-size: 0.72rem;
    color: var(--text-light);
    text-align: center;
    opacity: 0.7;
  }

  /* NFC chip icon */
  .nfc-chip {
    font-size: 0.75rem;
    background: var(--mint);
    color: #2A6050;
    border-radius: 999px;
    padding: 0.25rem 0.75rem;
    margin-bottom: 0.3rem;
    display: inline-block;
  }

  @media (max-width: 360px) {
    header h1 { font-size: 1.35rem; }
    .mini-cards { grid-template-columns: 1fr 1fr; gap: 0.5rem; }
  }
</style>
</head>
<body>

<div class="bg-deco" id="bgDeco"></div>

<div class="wrap">
  <div class="nfc-chip">✦ NFC 태그됨</div>

  <header>
    <span class="header-emoji" id="mainEmoji">🔮</span>
    <h1>Kelly님의 오늘의 운세</h1>
    <p id="todayDate"></p>
  </header>

  <div class="date-badge" id="lunarDate">로딩 중...</div>

  <!-- Main fortune card -->
  <div class="card hidden" id="mainCard">
    <div class="fortune-category" id="fortuneCategory">🌟 오늘의 한마디</div>
    <div class="star-row" id="starRow"></div>
    <div class="fortune-title" id="fortuneTitle">운세를 불러오는 중...</div>
    <div class="fortune-body" id="fortuneBody"></div>
  </div>

  <!-- Mini cards -->
  <div class="mini-cards">
    <div class="mini-card hidden" id="mc1">
      <div class="mini-card-label">🍽️ 오늘의 점심</div>
      <div class="mini-card-value" id="mcLunch">-</div>
    </div>
    <div class="mini-card hidden" id="mc2">
      <div class="mini-card-label">🔢 행운의 숫자</div>
      <div class="mini-card-value" id="mcNumber">-</div>
    </div>
    <div class="mini-card hidden" id="mc3">
      <div class="mini-card-label">🎨 행운의 색</div>
      <div class="mini-card-value" id="mcColor">-</div>
    </div>
    <div class="mini-card hidden" id="mc4">
      <div class="mini-card-label">⏰ 행운의 시간</div>
      <div class="mini-card-value" id="mcTime">-</div>
    </div>
  </div>

  <button class="btn" id="rerollBtn" onclick="reroll()">🎲 다시 뽑기</button>
  <p class="footer-note">태그할 때마다 새로운 운세가 펼쳐져요 ✨</p>
</div>

  { cat:"☀️ 행운의 메시지", stars:5, title:"당신에게 좋은 일이 생깁니다", body:"오늘 길을 걷다가 100원짜리를 발견할 수도 있어요. 작은 행운이 큰 기쁨이 되는 하루입니다." },
  { cat:"🌙 오늘의 조언", stars:3, title:"잠깐, 오늘은 충동구매 주의!", body:"할인 알림이 울려도 카트에 담기만 하고 하루 기다려봐요. 내일이면 사고 싶지 않을 거예요 (아마도)." },
  { cat:"💫 운세 예언", stars:4, title:"뜻밖의 연락이 올 수 있어요", body:"오래 연락 못 했던 사람에게서 메시지가 올 수 있어요. 반갑게 답장해 주세요, 좋은 인연이 이어질 거예요!" },
  { cat:"🌈 오늘의 기운", stars:5, title:"오늘 당신은 주인공!", body:"오늘 하루, 당신의 매력이 MAX치로 발산됩니다. 셀카 찍기 딱 좋은 날이에요. 각도 잘 잡으면 인생샷 완성!" },
  { cat:"🍀 행운의 메시지", stars:4, title:"노력이 빛을 발하는 날", body:"꾸준히 해온 일들이 드디어 인정받을 시간이 왔어요. 오늘은 결과보다 과정을 즐겨봐요." },
  { cat:"⭐ 오늘의 조언", stars:2, title:"오늘은 집순이/집돌이 모드 ON", body:"밖에 나가면 괜히 지갑이 열릴 것 같은 날. 집에서 유튜브 보며 쉬는 게 최선의 선택일 수 있어요." },
  { cat:"🌸 운세 예언", stars:5, title:"카페인이 오늘의 행운을 부릅니다", body:"오늘 아침 커피 한 잔이 하루를 180도 바꿔줄 거예요. 아직 안 마셨다면 지금 당장 마시러 가세요!" },
  { cat:"✨ 오늘의 기운", stars:3, title:"신중하게, 그러나 포기하지 말고!", body:"오늘은 결정을 서두르기보다 한 발짝 물러서서 생각해보는 게 좋아요. 내일은 더 명확하게 보일 거예요." },
  { cat:"🌟 행운의 메시지", stars:4, title:"오늘 맛있는 거 먹으면 살 안 찜", body:"(과학적 근거는 없지만) 오늘만큼은 먹고 싶은 거 다 먹어도 될 것 같은 기운이에요. 삶의 질이 곧 운세랍니다." },

  { cat:"🦋 운세 예언", stars:3, title:"갑자기 음악이 귓가를 맴돌 것", body:"오늘 하루 이유 없이 노래 하나가 머릿속에서 계속 재생될 거예요. 그 노래의 가사가 오늘의 힌트!" },
  { cat:"🌺 오늘의 기운", stars:4, title:"좋은 뉴스가 들려올 예감", body:"오늘 기다리던 소식이 올 수 있어요. 핸드폰을 자주 확인하게 될 것 같지만, 침착하게 기다려봐요." },

  { cat:"🌙 오늘의 조언", stars:2, title:"졸음 주의보 발령!", body:"오늘따라 유독 눈이 무거운 날. 점심 후 10분 낮잠이 오후 생산성을 세 배로 높여줄 거예요. 알람 맞추는 거 잊지 마요!" },

  { cat:"🐣 오늘의 기운", stars:4, title:"새로운 시작을 알리는 날", body:"무언가를 시작하기 딱 좋은 기운이에요. 배우고 싶었던 것, 만들고 싶었던 것, 오늘이 바로 그 첫 날!" },

  { cat:"🌠 운세 예언", stars:4, title:"소원 말하면 이루어지는 날", body:"오늘은 소원을 크게 소리 내어 말해봐요. 부끄럽더라도! 말로 꺼내면 꿈에 한 걸음 더 가까워진답니다." },
];

const lunches = ["김치찌개 🍲","된장찌개 🫕","비빔밥 🥗","불고기 정식 🥩","삼겹살 구이 🥓","냉면 🍜","짜장면 🍝","짬뽕 🍜","순두부찌개 🥘","갈비탕 🍲","떡볶이 🌶️","순대국밥 🫕","칼국수 🍜","쌀국수 🍜","마라탕 🌶️","초밥 🍣","라멘 🍜","파스타 🍝","샌드위치 🥪","샐러드 🥗","치킨 🍗","피자 🍕","버거 🍔","제육볶음 🥘","오므라이스 🍳","카레 🍛","덮밥 🍚","타코 🌮","아보카도 토스트 🥑","훠궈 🍲"];

const numbers = ["3","7","11","13","21","27","42","77","88","99","4","8","14","23","36","48","55","63","72","81","5","9","17","29","33","47","56","68","74","86"];

const colors = [
  { name:"라벤더 퍼플", hex:"#C9B8FF" },
  { name:"코랄 핑크", hex:"#FF8FA3" },
  { name:"민트 그린", hex:"#48D4A8" },
  { name:"선샤인 옐로우", hex:"#FFD966" },
  { name:"스카이 블루", hex:"#70C0FF" },
  { name:"피치 오렌지", hex:"#FFB07C" },
  { name:"라일락", hex:"#DDA0DD" },
  { name:"터콰이즈", hex:"#40E0D0" },
  { name:"로즈 골드", hex:"#F4A0A0" },
  { name:"아이스 블루", hex:"#B8E0FF" },
  { name:"세이지 그린", hex:"#9DC88D" },
  { name:"버터 옐로우", hex:"#FFF3A3" },
  { name:"코코아 브라운", hex:"#C4956A" },
  { name:"포레스트 그린", hex:"#6BAF92" },
  { name:"버건디", hex:"#C75B7A" },
];

const times = ["오전 9시","오전 10시","오전 11시","정오 12시","오후 1시","오후 2시","오후 3시","오후 4시","오후 5시","오후 6시","오후 7시","오후 8시","오후 9시","오전 7시","오전 8시"];

const bgDecos = ['✦','⋆','°','˚','*','✧','·','˙','⁎','✩','꼭','❋','◌'];

function seededRandom(seed) {
  let s = seed;
  return function() {
    s = (s * 1664525 + 1013904223) & 0xffffffff;
    return (s >>> 0) / 0x100000000;
  };
}

function getDailySeed() {
  const now = new Date();
  return now.getFullYear() * 10000 + (now.getMonth()+1) * 100 + now.getDate();
}

let currentSeed = getDailySeed();
let rerollCount = 0;

function buildBg() {
  const deco = document.getElementById('bgDeco');
  for (let i = 0; i < 18; i++) {
    const s = document.createElement('span');
    s.textContent = bgDecos[i % bgDecos.length];
    s.style.left = (5 + Math.random() * 90) + '%';
    s.style.top = (5 + Math.random() * 90) + '%';
    s.style.animationDelay = (Math.random() * 5) + 's';
    s.style.animationDuration = (5 + Math.random() * 6) + 's';
    s.style.fontSize = (0.7 + Math.random() * 1.2) + 'rem';
    deco.appendChild(s);
  }
}

function pickFortune(useRandom) {
  const rng = useRandom
    ? () => Math.random()
    : (() => { const r = seededRandom(currentSeed); return () => r(); })();
  const f = fortunes[Math.floor(rng() * fortunes.length)];
  const lunch = lunches[Math.floor(rng() * lunches.length)];
  const num = numbers[Math.floor(rng() * numbers.length)];
  const col = colors[Math.floor(rng() * colors.length)];
  const time = times[Math.floor(rng() * times.length)];
  return { f, lunch, num, col, time };
}

function renderStars(n) {
  return Array.from({length:5}, (_,i) => `<span class="star">${i < n ? '⭐' : '🌑'}</span>`).join('');
}

function setDate() {
  const d = new Date();
  const days = ['일','월','화','수','목','금','토'];
  document.getElementById('todayDate').textContent =
    `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]}요일)`;
  document.getElementById('lunarDate').textContent = '✨ 오늘의 운세 카드';
}

function showFortune(animate, useRandom) {
  const { f, lunch, num, col, time } = pickFortune(useRandom);
  const mainCard = document.getElementById('mainCard');
  const mcs = ['mc1','mc2','mc3','mc4'].map(id => document.getElementById(id));

  if (animate) {
    mainCard.classList.add('hidden');
    mcs.forEach(m => m.classList.add('hidden'));
  }

  setTimeout(() => {
    document.getElementById('fortuneCategory').textContent = f.cat;
    document.getElementById('starRow').innerHTML = renderStars(f.stars);
    document.getElementById('fortuneTitle').textContent = f.title;
    document.getElementById('fortuneBody').textContent = f.body;

    document.getElementById('mcLunch').textContent = lunch;
    document.getElementById('mcNumber').textContent = num;
    const colorDot = `<span class="color-dot" style="background:${col.hex}"></span>`;
    document.getElementById('mcColor').innerHTML = col.name + colorDot;
    document.getElementById('mcTime').textContent = time;

    setTimeout(() => {
      mainCard.classList.remove('hidden');
      mcs.forEach((m, i) => {
        setTimeout(() => m.classList.remove('hidden'), i * 80);
      });
    }, animate ? 200 : 0);
  }, animate ? 200 : 0);
}

function reroll() {
  showFortune(true, true);
  const btn = document.getElementById('rerollBtn');
  btn.textContent = '🎲 다시 뽑기';
}

function init() {
  buildBg();
  setDate();
  showFortune(false);
  setTimeout(() => {
    document.getElementById('mainCard').classList.remove('hidden');
    ['mc1','mc2','mc3','mc4'].forEach((id, i) => {
      setTimeout(() => document.getElementById(id).classList.remove('hidden'), i * 100 + 200);
    });
  }, 400);
}

init();
</script>
</body>
</html>
