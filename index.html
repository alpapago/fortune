<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>오늘의 운세 ✨</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #EEF6FB;
    --lilac: #C8A8E9;
    --lilac-light: #EDE0F8;
    --lilac-mid: #B48FD8;
    --aqua: #7DD4E8;
    --aqua-light: #D6F0F8;
    --seafoam: #8FD8C8;
    --sky: #B8E8F8;
    --white: #FAFEFF;
    --text: #2A3A5C;
    --text-light: #6A7FA8;
    --gold: #F5D87A;
    --card-bg: #FAFEFF;
  }
  body {
    font-family: 'Gowun Dodum', serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    overflow-x: hidden;
    position: relative;
  }
  body::before {
    content: '';
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 38vh;
    background: linear-gradient(180deg, transparent, rgba(125,212,232,0.18));
    pointer-events: none;
    z-index: 0;
  }
  .bg-deco {
    position: fixed; inset: 0;
    pointer-events: none; overflow: hidden; z-index: 0;
  }
  .bg-deco span {
    position: absolute; opacity: 0.13;
    animation: float-deco 8s ease-in-out infinite;
  }
  @keyframes float-deco {
    0%, 100% { transform: translateY(0px) rotate(0deg); }
    50% { transform: translateY(-14px) rotate(12deg); }
  }

  /* ── SETUP SCREEN ── */
  .setup-screen {
    position: relative; z-index: 1;
    width: 100%; max-width: 380px;
    display: flex; flex-direction: column; align-items: center; gap: 1rem;
  }
  .setup-card {
    background: var(--card-bg);
    border-radius: 24px;
    border: 1.5px solid var(--lilac);
    padding: 1.8rem 1.6rem;
    width: 100%;
    box-shadow: 0 4px 28px rgba(180,143,216,0.15);
  }
  .setup-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 1.15rem; font-weight: 700;
    color: var(--text); text-align: center;
    margin-bottom: 1.2rem;
  }
  .setup-label {
    font-size: 0.78rem; color: var(--text-light);
    margin-bottom: 0.3rem; display: block;
  }
  .setup-input {
    width: 100%;
    border: 1.5px solid var(--sky);
    border-radius: 12px;
    padding: 0.65rem 0.9rem;
    font-family: 'Gowun Dodum', serif;
    font-size: 0.95rem; color: var(--text);
    background: var(--bg);
    margin-bottom: 0.9rem;
    outline: none;
    transition: border 0.2s;
  }
  .setup-input:focus { border-color: var(--lilac-mid); }

  /* ── MAIN SCREEN ── */
  .wrap {
    position: relative; z-index: 1;
    width: 100%; max-width: 420px;
    display: flex; flex-direction: column; align-items: center;
    gap: 0.75rem;
  }
  .lilac-header-svg { width: 100%; margin-bottom: -0.3rem; }
  .nfc-chip {
    font-size: 0.74rem;
    background: var(--aqua-light); color: #3A7A8A;
    border-radius: 999px; padding: 0.25rem 0.8rem;
    margin-bottom: 0.2rem; display: inline-block;
  }
  .date-badge {
    background: linear-gradient(135deg, var(--lilac), var(--aqua));
    color: #fff; border-radius: 999px;
    padding: 0.35rem 1.2rem; font-size: 0.78rem;
    font-family: 'Gowun Dodum', serif; letter-spacing: 0.03em;
  }

  /* ── LOADING ── */
  .loading-card {
    background: var(--card-bg);
    border-radius: 22px; border: 1.5px solid var(--aqua);
    padding: 2rem 1.4rem; width: 100%;
    text-align: center;
    box-shadow: 0 4px 28px rgba(125,212,232,0.15);
  }
  .loading-spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--lilac-light);
    border-top-color: var(--lilac-mid);
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 0.8rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 0.9rem; color: var(--text-light); line-height: 1.7; }

  /* ── FORTUNE CARD ── */
  .card {
    background: var(--card-bg);
    border-radius: 22px; border: 1.5px solid var(--aqua);
    padding: 1.2rem 1.4rem; width: 100%;
    box-shadow: 0 4px 28px rgba(125,212,232,0.15);
    position: relative; overflow: hidden;
    transition: transform 0.3s ease, opacity 0.3s ease;
  }
  .card.hidden { opacity: 0; transform: scale(0.95) translateY(8px); pointer-events: none; }
  .card::before {
    content: ''; position: absolute;
    top: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg, var(--lilac), var(--aqua), var(--seafoam));
  }
  .fortune-category {
    justify-content: center; text-align: center;
    font-size: 0.72rem; letter-spacing: 0.07em;
    color: var(--aqua); filter: brightness(0.75);
    margin-bottom: 0.45rem;
    display: flex; align-items: center; gap: 0.4rem;
  }
  .star-row { display: flex; gap: 0.22rem; justify-content: center; margin: 0.2rem 0 0.1rem; }
  .star { font-size: 1.05rem; }
  .fortune-title {
    text-align: center; font-family: 'Noto Serif KR', serif;
    font-size: 1.15rem; font-weight: 700;
    color: var(--text); margin-bottom: 0.45rem; line-height: 1.55;
  }
  .fortune-body {
    text-align: center; font-size: 0.9rem;
    color: var(--text-light); line-height: 1.85;
  }

  /* ── LOTTO CARD ── */
  .lotto-card {
    background: var(--card-bg);
    border-radius: 22px; border: 1.5px solid var(--gold);
    padding: 1rem 1.2rem; width: 100%;
    box-shadow: 0 4px 20px rgba(245,216,122,0.18);
    text-align: center;
    transition: opacity 0.3s ease, transform 0.3s ease;
  }
  .lotto-card.hidden { opacity: 0; transform: translateY(6px); }
  .lotto-label {
    font-size: 0.72rem; color: #B89A30; margin-bottom: 0.55rem;
    letter-spacing: 0.06em;
  }
  .lotto-balls {
    display: flex; gap: 0.45rem; justify-content: center; flex-wrap: wrap;
  }
  .ball {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Noto Serif KR', serif;
    font-size: 0.85rem; font-weight: 700; color: #fff;
  }
  .ball.r1 { background: #E8C840; }
  .ball.r2 { background: #4BA8E8; }
  .ball.r3 { background: #E05858; }
  .ball.r4 { background: #888; }
  .ball.r5 { background: #5CC870; }

  /* ── MINI CARDS ── */
  .mini-cards {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 0.65rem; width: 100%;
  }
  .mini-card {
    text-align: center; background: var(--card-bg);
    border: 1.5px solid var(--sky); border-radius: 16px;
    padding: 0.75rem;
    transition: transform 0.3s ease, opacity 0.3s ease;
  }
  .mini-card.hidden { opacity: 0; transform: translateY(6px); }
  .mini-card-label {
    justify-content: center; font-size: 0.68rem;
    color: var(--text-light); margin-bottom: 0.3rem;
    display: flex; align-items: center; gap: 0.25rem;
  }
  .mini-card-value {
    text-align: center; font-family: 'Noto Serif KR', serif;
    font-size: 0.97rem; font-weight: 700; color: var(--text);
  }
  .color-dot {
    display: inline-block; width: 13px; height: 13px;
    border-radius: 50%; vertical-align: -2px;
    margin-left: 5px; border: 1.5px solid rgba(0,0,0,0.08);
  }

  /* ── BUTTONS ── */
  .btn {
    background: linear-gradient(135deg, var(--lilac-mid), var(--aqua));
    color: white; border: none; border-radius: 999px;
    padding: 0.7rem 2rem; font-family: 'Gowun Dodum', serif;
    font-size: 1rem; cursor: pointer;
    transition: transform 0.15s, filter 0.15s;
    box-shadow: 0 4px 18px rgba(180,143,216,0.32);
    width: 100%; max-width: 280px;
  }
  .btn:hover { filter: brightness(1.07); transform: translateY(-2px); }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  .btn-sm {
    background: none; border: 1.5px solid var(--lilac);
    color: var(--lilac-mid); border-radius: 999px;
    padding: 0.4rem 1.2rem; font-family: 'Gowun Dodum', serif;
    font-size: 0.82rem; cursor: pointer;
    transition: background 0.15s;
  }
  .btn-sm:hover { background: var(--lilac-light); }

  @media (max-width: 360px) {
    .mini-cards { gap: 0.5rem; }
  }
</style>
</head>

<script>

const colors = [

  { name:"버터 옐로우", hex:"#FFF3A3" },
  { name:"포레스트 그린", hex:"#6BAF92" },
];
const times = ["오전 9시","오전 10시","오전 11시","정오 12시","오후 1시","오후 2시","오후 3시","오후 4시","오후 5시","오후 6시","오후 7시","오후 8시"];
const meWords = ["매력 폭발", "집중력 UP", "센스 장인", "분위기 메이커", "행운아", "에너지 충전", "힐링 모드", "카리스마", "감성 충만", "아이디어 뱅크"];
const bgDecos = ['🌸','✦','⋆','˚','✧','·','🫧','💧','🌿','°','⁎','✩','❋','🐚'];

let userName = 'Kelly';
let userBirth = '';
let apiKey = '';

function buildBg() {
  const deco = document.getElementById('bgDeco');
  for (let i = 0; i < 18; i++) {
    const s = document.createElement('span');
    s.textContent = bgDecos[i % bgDecos.length];
    s.style.left = (5 + Math.random() * 90) + '%';
    s.style.top = (5 + Math.random() * 90) + '%';
    s.style.animationDelay = (Math.random() * 5) + 's';
    s.style.animationDuration = (5 + Math.random() * 6) + 's';
    s.style.fontSize = (0.7 + Math.random() * 1.2) + 'rem';
    deco.appendChild(s);
  }
}

function setDate() {
  const d = new Date();
  const days = ['일','월','화','수','목','금','토'];
  const dateStr = `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]})`;
  const svgEls = document.querySelectorAll('#svgDate');
  svgEls.forEach(el => el.textContent = dateStr);
}

function renderStars(n) {
  return Array.from({length:5}, (_,i) =>
    `<span class="star">${i < n ? '⭐' : '🌑'}</span>`).join('');
}

function getLottoColor(n) {
  if (n <= 10) return 'r1';
  if (n <= 20) return 'r2';
  if (n <= 30) return 'r3';
  if (n <= 40) return 'r4';
  return 'r5';
}

function renderLotto(numbers) {
  const balls = document.getElementById('lottoBalls');
  balls.innerHTML = numbers.map(n =>
    `<div class="ball ${getLottoColor(n)}">${n}</div>`
  ).join('');
}

function pickRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function fillMiniCards() {
  const lunch = pickRandom(lunches);
  const col = pickRandom(colors);
  const time = pickRandom(times);
  const me = pickRandom(meWords);
  document.getElementById('mcLunch').textContent = lunch;
  const colorDot = `<span class="color-dot" style="background:${col.hex}"></span>`;
  document.getElementById('mcColor').innerHTML = col.name + colorDot;
  document.getElementById('mcTime').textContent = time;
  document.getElementById('mcMe').textContent = me;
}

function showCards(aiResult) {
  // Parse AI response
  let title = '', body = '', stars = 4, lotto = [];
  try {
    const t = aiResult.title || '';
    const b = aiResult.body || '';
    const s = parseInt(aiResult.stars) || 4;
    const l = aiResult.lotto || [];
    title = t; body = b; stars = Math.min(5, Math.max(1, s)); lotto = l;
  } catch(e) {}

  document.getElementById('fortuneCategory').textContent = '🔮 AI 오늘의 운세';
  document.getElementById('starRow').innerHTML = renderStars(stars);
  document.getElementById('fortuneTitle').textContent = title;
  document.getElementById('fortuneBody').textContent = body;

  renderLotto(lotto);
  fillMiniCards();

  document.getElementById('loadingCard').style.display = 'none';
  document.getElementById('mainCard').classList.remove('hidden');
  document.getElementById('lottoCard').classList.remove('hidden');
  ['mc1','mc2','mc3','mc4'].forEach((id, i) => {
    setTimeout(() => document.getElementById(id).classList.remove('hidden'), i * 80 + 100);
  });
  document.getElementById('rerollBtn').disabled = false;
}

function resetCards() {
  document.getElementById('mainCard').classList.add('hidden');
  document.getElementById('lottoCard').classList.add('hidden');
  ['mc1','mc2','mc3','mc4'].forEach(id => document.getElementById(id).classList.add('hidden'));
  document.getElementById('loadingCard').style.display = 'block';
  document.getElementById('rerollBtn').disabled = true;
}

async function fetchFortune() {
  const d = new Date();
  const today = `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${['일','월','화','수','목','금','토'][d.getDay()]}요일)`;

  const birthStr = userBirth
    ? (() => { const b = new Date(userBirth); return `${b.getFullYear()}년 ${b.getMonth()+1}월 ${b.getDate()}일생`; })()
    : '생년월일 미입력';

  const age = userBirth
    ? (() => { const b = new Date(userBirth); const now = new Date(); let a = now.getFullYear() - b.getFullYear(); if (now.getMonth() < b.getMonth() || (now.getMonth() === b.getMonth() && now.getDate() < b.getDate())) a--; return a; })()
    : '';

  const prompt = `당신은 재미있고 긍정적인 운세 점술사입니다. 아래 정보를 바탕으로 오늘의 운세를 작성해주세요.

이름: ${userName}
생년월일: ${birthStr}${age ? ` (만 ${age}세)` : ''}
오늘 날짜: ${today}

다음 JSON 형식으로만 응답하세요 (다른 텍스트 없이):
{
  "title": "오늘 운세 한 줄 제목 (20자 이내, 재미있고 공감가게)",
  "body": "오늘의 운세 설명 (80~120자, ${userName}님에게 맞춘 따뜻하고 재미있는 운세. 생년월일 기반 기운 언급)",
  "stars": 별점 숫자 (1~5),
  "lotto": [로또번호 6개 숫자 배열, 1~45 사이 중복없이]
}`;

  // Read key fresh in case it loaded after init
  const currentKey = apiKey || window.GEMINI_API_KEY || '';
  if (!currentKey || currentKey === 'YOUR_API_KEY_HERE') throw new Error('API 키 없음');
  const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${currentKey}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      contents: [{ parts: [{ text: prompt }] }],
      generationConfig: { temperature: 0.9, maxOutputTokens: 512 }
    })
  });

  if (!res.ok) throw new Error('API 오류: ' + res.status);
  const data = await res.json();
  const raw = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
  const jsonStr = raw.replace(/```json|```/g, '').trim();
  return JSON.parse(jsonStr);
}

async function loadFortune() {
  resetCards();
  document.getElementById('loadingText').innerHTML = `${userName}님의 오늘 운세를 AI가 읽고 있어요...<br>잠시만 기다려주세요 🌸`;
  try {
    const result = await fetchFortune();
    showCards(result);
  } catch(e) {
    document.getElementById('loadingCard').style.display = 'none';
    document.getElementById('mainCard').classList.remove('hidden');
    document.getElementById('fortuneCategory').textContent = '⚠️ 오류';
    document.getElementById('starRow').innerHTML = '';
    document.getElementById('fortuneTitle').textContent = 'API 연결에 실패했어요';
    const msg = e.message.includes('429')
      ? '오늘 요청 횟수를 초과했어요. 내일 다시 시도해주세요! (무료 플랜: 일 1,500회)'
      : 'API 키를 확인하거나 잠시 후 다시 시도해보세요. (' + e.message + ')';
    document.getElementById('fortuneBody').textContent = msg;
    document.getElementById('rerollBtn').disabled = false;
  }
}

function startFortune() {
  const name = document.getElementById('inputName').value.trim();
  const birth = document.getElementById('inputBirth').value;

  if (!name) { alert('이름을 입력해주세요!'); return; }
  const key = window.GEMINI_API_KEY || '';
  if (!key || key === 'YOUR_API_KEY_HERE') {
    alert('API 키가 설정되지 않았어요. GitHub Secret을 확인해주세요.');
    return;
  }

  userName = name;
  userBirth = birth;
  apiKey = key;

  sessionStorage.setItem('fortune_name', name);
  sessionStorage.setItem('fortune_birth', birth);

  document.getElementById('setupScreen').style.display = 'none';
  document.getElementById('mainScreen').style.display = 'flex';
  setDate();
  loadFortune();
}

function reroll() { loadFortune(); }

function goSetup() {
  document.getElementById('mainScreen').style.display = 'none';
  document.getElementById('setupScreen').style.display = 'flex';
}

buildBg();

// config.js loads after this script, so init runs on window load
window.addEventListener('load', function() {
  const savedName = sessionStorage.getItem('fortune_name');
  const savedBirth = sessionStorage.getItem('fortune_birth');
  if (savedName) document.getElementById('inputName').value = savedName;
  if (savedBirth) document.getElementById('inputBirth').value = savedBirth;

  if (savedName && window.GEMINI_API_KEY && window.GEMINI_API_KEY !== 'YOUR_API_KEY_HERE') {
    startFortune();
  }
});
</script>
<script src="config.js"></script>
